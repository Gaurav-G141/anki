syntax = "proto3";

option java_multiple_files = true;

package anki.speedrun;

// Fork-specific (Speedrun PGRE) read-only service. See PRD.md / SPECS.md
// (S2/S3).
service SpeedrunService {
  // Per-topic mastery plus an honest, range-bearing memory score.
  rpc TopicMastery(TopicMasteryRequest) returns (TopicMasteryResponse);
  // Per-deck mastered-card counts, for the Stats "Mastered" view. Added after
  // TopicMastery so existing method indices stay stable.
  rpc DeckMastery(DeckMasteryRequest) returns (DeckMasteryResponse);
}

// Implicitly delegates the above to the collection-scoped service.
service BackendSpeedrunService {}

message TopicMasteryRequest {
  // Zero/empty fields fall back to the documented defaults.
  float mastered_threshold =
      1;  // default 0.9 (recall R at/above this = mastered)
  uint32 review_floor =
      2;  // default 20 (abstain below this many graded reviews)
  float coverage_floor =
      3;  // default 0.40 (abstain below this weighted coverage)
}

message AppliedThresholds {
  float mastered_threshold = 1;
  uint32 review_floor = 2;
  float coverage_floor = 3;
}

message TopicMastery {
  string tag = 1;
  string name = 2;
  float weight = 3;  // exam content weight in [0,1]
  uint32 total_cards = 4;
  uint32 cards_with_state = 5;  // cards that have FSRS memory state
  uint32 mastered = 6;  // cards with current recall >= mastered_threshold
  float mean_retrievability = 7;
  float mean_stability = 8;  // days
  uint32 median_latency_ms = 9;
  // Demonstrated recall accuracy for this subject: graded reviews with grade
  // >= Good over all graded reviews (0 when the subject has no reviews).
  float accuracy = 10;
}

message TopicMasteryResponse {
  // The give-up rule: when true, no score is shown and abstain_reasons
  // explains.
  bool abstain = 1;
  repeated string abstain_reasons = 2;

  // Score (mastered fraction) + Wilson 95% interval. Valid only when !abstain.
  float memory_score = 3;
  float score_low = 4;
  float score_high = 5;

  // Honesty metadata (always populated).
  float coverage = 6;  // weighted fraction of exam subjects with >=1 card
  uint32 total_reviews = 7;
  string confidence = 8;        // "low" | "medium" | "high"
  repeated string reasons = 9;  // weakest covered subjects (when scored)
  int64 updated_at_millis = 10;
  AppliedThresholds thresholds = 11;

  repeated TopicMastery topics = 12;

  // ---- Three-score honesty (Cannot-break rule #3): each score is separate and
  // carries its own range + confidence + independent abstain. Field numbers are
  // additive (never reused/reordered).

  // Performance = demonstrated recall accuracy on graded reviews (grade >=
  // Good), as an aggregate fraction in [0,1] with a Wilson 95% range. This
  // measures accuracy on *reviewed* material, NOT held-out generalization (the
  // AI paraphrase test is the Sunday proof). Independent abstain: needs graded
  // reviews + coverage, but NOT FSRS memory state.
  bool performance_abstain = 13;
  repeated string performance_abstain_reasons = 14;
  float performance_score = 15;  // [0,1], valid only when !performance_abstain
  float performance_low = 16;
  float performance_high = 17;
  string performance_confidence = 18;  // "low" | "medium" | "high"
  repeated string performance_reasons =
      19;  // weakest covered subjects by accuracy

  // Readiness = projected PGRE scaled score in [200,990] (10-pt increments),
  // mapped from performance via a documented linear anchor; the range widens as
  // coverage shrinks and confidence is capped below "high" (it is a projection,
  // not a validated exam result). Derived from performance (abstains when it
  // does).
  bool readiness_abstain = 20;
  repeated string readiness_abstain_reasons = 21;
  float readiness_score = 22;  // [200,990], valid only when !readiness_abstain
  float readiness_low = 23;
  float readiness_high = 24;
  string readiness_confidence = 25;
  repeated string readiness_reasons = 26;
}

message DeckMasteryRequest {
  float mastered_threshold =
      1;  // default 0.9 (recall R at/above this = mastered)
}

message DeckMastery {
  int64 deck_id = 1;
  string deck_name = 2;  // full human name, e.g. "PGRE::Classical Mechanics"
  uint32 total_cards = 3;
  uint32 cards_with_state = 4;  // cards that have FSRS memory state
  uint32 mastered = 5;
  float mean_retrievability = 6;
}

message DeckMasteryResponse {
  repeated DeckMastery decks = 1;  // one row per deck that has >=1 card
  float mastered_threshold = 2;
}
