# cbindgen configuration for anki-ffi.
# Emits a plain C header for the extern "C" surface.

language = "C"
header = "// Generated by cbindgen from mobile/anki-ffi. Do not edit by hand."
include_guard = "ANKI_FFI_H"
pragma_once = true
autogen_warning = "// WARNING: this file is auto-generated; edits will be lost."
cpp_compat = true
tab_width = 4
style = "type"
# `Backend` lives in the `anki` dependency crate, so cbindgen can't see its
# definition. Forward-declare it as an opaque handle so the header is valid C.
after_includes = "\ntypedef struct AnkiBackend AnkiBackend;\n"

[parse]
parse_deps = false

[export]
# The opaque backend handle is referenced only behind a pointer.
[export.rename]
"Backend" = "AnkiBackend"

[defines]
