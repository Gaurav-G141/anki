name: SpeedrunApp
options:
  bundleIdPrefix: net.ankiweb
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

packages:
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf.git
    from: "1.28.0"

targets:
  SpeedrunApp:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources
      - path: Generated
      - path: CAnkiFFI
        # The module map + header are exposed to Swift via SWIFT_INCLUDE_PATHS
        # below; we still list it so xcodegen tracks the files in the project.
        buildPhase: none
      # Bundle the prebuilt PGRE exam deck as an app resource; ReviewSession
      # copies it to Documents/collection.anki2 on first launch. Force the
      # resources build phase so the unknown .anki2 extension isn't treated as a
      # compile source.
      - path: Resources/pgre_exam.anki2
        buildPhase: resources
      # Bundle the real-exam MCQ questions (same data as the desktop) for the
      # phone's Practice-MCQs (Performance) screen. See MCQView.swift.
      - path: Resources/pgre_mcq.json
        buildPhase: resources
      # Stage-1 optimal-approach key: the AI coach's grading reference + the
      # AI-off fallback ("⚡ Fastest approach"). Byte-identical to the desktop's
      # qt/aqt/data/pgre_optimal_approaches.jsonl. See HeuristicCoach.swift.
      - path: Resources/optimal_approaches.jsonl
        buildPhase: resources
      # Bundle a trimmed MathJax (tex-chtml + web fonts) so the card WebView can
      # typeset the formula LaTeX offline. `type: folder` = a folder reference,
      # copied verbatim so the output/chtml/fonts subtree is preserved.
      - path: Resources/mathjax
        type: folder
      # Bundle the 9 PGRE subject decks (.apkg) so they can be imported on the
      # phone via "+ → Import Deck" (CollectionStore.importBundled). A group (NOT
      # a folder reference) so each file lands flat in the bundle root, where
      # Bundle.main.url(forResource:withExtension:"apkg") resolves it. Force the
      # resources phase so the unknown .apkg extension isn't treated as a source.
      - path: Resources/decks
        buildPhase: resources
    dependencies:
      - package: SwiftProtobuf
      - framework: ../AnkiCore.xcframework
        embed: false
    postBuildScripts:
      # Bake the OpenAI key (from the OPENAI_API_KEY build setting / xcodebuild
      # override) into the app bundle as openai_key.txt. Empty when unset → the
      # coach reports AI-off and shows the precomputed fallback. Never committed.
      - name: Bake OpenAI key
        basedOnDependencyAnalysis: false
        script: |
          printf '%s' "${OPENAI_API_KEY:-}" > "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/openai_key.txt"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.ankiweb.speedrun
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        TARGETED_DEVICE_FAMILY: "1,2"
        # The xcframework provides only arm64 slices (device + Apple-silicon
        # simulator); exclude the legacy x86_64 simulator arch so linking finds
        # a matching slice. Apple-silicon Macs run the simulator as arm64.
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Speedrun
        # OpenAI key for the Stage-2 AI Heuristic Coach. Empty default so fresh
        # clones build (AI-off → fallback); provide it per build:
        # `xcodebuild … OPENAI_API_KEY="sk-…"`. A post-build script (below) writes
        # it into the bundle as openai_key.txt. NOT committed. (Security caveat: a
        # baked-in key is extractable; Keychain / in-app entry is deferred.)
        OPENAI_API_KEY: ""
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        # Expose the C FFI module map to Swift.
        SWIFT_INCLUDE_PATHS: $(SRCROOT)/CAnkiFFI
        # The xcframework is a plain static archive; no code signing of the lib.
        CODE_SIGNING_ALLOWED: NO
        # libanki_ffi.a needs the C++ and compression system libs that rslib's
        # deps (zstd, etc.) and the Rust std library pull in.
        OTHER_LDFLAGS:
          - -lc++
          - -lz
  SpeedrunAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: UITests
    dependencies:
      - target: SpeedrunApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.ankiweb.speedrun.uitests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
        TEST_TARGET_NAME: SpeedrunApp
        CODE_SIGNING_ALLOWED: NO
  # Logic (unit) tests for the AI Heuristic Coach, hosted by the app so
  # `Bundle.main` resolves the bundled optimal-approach key.
  SpeedrunAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: Tests
    dependencies:
      - target: SpeedrunApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.ankiweb.speedrun.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SpeedrunApp.app/SpeedrunApp"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGNING_ALLOWED: NO
        # @testable import SpeedrunApp pulls in the app's CAnkiFFI module, so the
        # test target must see the same module map + exclude the x86_64 sim slice.
        SWIFT_INCLUDE_PATHS: $(SRCROOT)/CAnkiFFI
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64

schemes:
  SpeedrunApp:
    build:
      targets:
        SpeedrunApp: all
        SpeedrunAppUITests: [test]
        SpeedrunAppTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SpeedrunAppTests
        - SpeedrunAppUITests
